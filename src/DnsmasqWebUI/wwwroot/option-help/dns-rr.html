<dt><b>--dns-rr=&lt;name&gt;,&lt;RR-number&gt;,[&lt;hex data&gt;]</b></dt>
<dd>Return an arbitrary DNS Resource Record. The number is the type of the
record (which is always in the C_IN class). The value of the record is
given by the hex data, which may be of the form 01:23:45 or 01 23 45 or
012345 or any mixture of these.</dd>
