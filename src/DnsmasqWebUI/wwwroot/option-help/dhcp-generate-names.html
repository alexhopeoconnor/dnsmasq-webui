<dt><b>--dhcp-generate-names=tag:&lt;tag&gt;[,tag:&lt;tag&gt;]</b></dt>
<dd>(IPv4 only) Generate a name for DHCP clients which do not otherwise have one,
using the MAC address expressed in hex, separated by dashes. Note that
if a host provides a name, it will be used by preference to this,
unless 
<b>--dhcp-ignore-names </b>

is set.</dd>
