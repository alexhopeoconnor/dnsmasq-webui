<dt><b>--quiet-dhcp, --quiet-dhcp6, --quiet-ra, --quiet-tftp</b></dt>
<dd>Suppress logging of the routine operation of these protocols. Errors and
problems will still be logged. <b>--quiet-tftp</b> does not consider file not
found to be an error. <b>--quiet-dhcp</b> and quiet-dhcp6 are over-ridden by
<b>--log-dhcp</b>.</dd>
