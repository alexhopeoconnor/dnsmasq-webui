# Extra options so effective config has resolv-file, dhcp-option (multi-value), and newer options. Not managed by app.
# resolv-file must point to a file that exists in the container (/data is the mount).
resolv-file=/data/resolv.dnsmasq
dhcp-option=3,172.28.0.1
# New options (readonly in UI when using this testdata)
no-round-robin
quiet-dhcp
dns-forward-max=150
use-stale-cache=60
